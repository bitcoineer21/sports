  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    html{overscroll-behavior-y:none}
    body{background:#0a0a0f;color:#e8e8e8;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;max-width:480px;margin:0 auto;min-height:100vh;padding-bottom:80px}
    .header{padding:16px 16px 0;position:sticky;top:0;z-index:10;background:#0a0a0f}
    .header-label{font-size:10px;font-weight:700;letter-spacing:3px;color:#333;text-transform:uppercase;margin-bottom:4px}
    .header-row{display:flex;align-items:center;justify-content:space-between}
    .header-title{font-size:26px;font-weight:900;letter-spacing:-0.5px;display:flex;align-items:baseline;gap:10px}
    .hdr-link{font-size:12px;font-weight:700;color:#4a9eff;text-decoration:none;border-bottom:1px solid rgba(74,158,255,0.35)}
    .header-updated{font-size:11px;color:#333;margin-top:3px;padding-bottom:10px}
    .btn-refresh{background:rgba(255,255,255,0.07);border:1px solid rgba(255,255,255,0.1);color:#fff;width:36px;height:36px;border-radius:50%;cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center}
    .btn-refresh.spinning{animation:spin 1s linear infinite}
    @keyframes spin{to{transform:rotate(360deg)}}
    .tabs{display:flex;overflow-x:auto;gap:6px;padding:8px 12px;scrollbar-width:none}
    .tabs::-webkit-scrollbar{display:none}
    .tab-btn{flex-shrink:0;background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.08);color:#666;padding:6px 14px;border-radius:20px;font-size:12px;font-weight:600;cursor:pointer;white-space:nowrap}
    .tab-btn.active{background:#fff;color:#000;border-color:#fff}
    #content{padding:8px 12px 0}
    .card{background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.07);border-radius:14px;padding:12px 14px;margin-bottom:8px}
    .card.live-red{border-color:rgba(255,60,60,0.4);background:rgba(255,30,30,0.06)}
    .card.live-blue{border-color:rgba(74,158,255,0.5);background:rgba(74,158,255,0.06)}
    .badge.blue{background:rgba(74,158,255,0.2);color:#4a9eff}
    .badge{display:inline-block;font-size:9px;font-weight:800;letter-spacing:1.5px;text-transform:uppercase;padding:3px 8px;border-radius:20px;margin-bottom:6px}
    .badge.red{background:rgba(255,50,50,0.2);color:#ff4444}
    .team{font-size:14px;font-weight:700}
    .vs{font-size:10px;color:#444;margin:2px 0}
    .score{font-size:22px;font-weight:900;letter-spacing:-1px}
    .score.live{color:#ff4444}
    .score.done{color:#ccc}
    .date-info{font-size:12px;color:#555;text-align:center}
    .date-info strong{color:#888}
    .bottom-nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;background:rgba(10,10,15,0.97);border-top:1px solid rgba(255,255,255,0.06);display:flex;padding:8px 0 max(8px,env(safe-area-inset-bottom));z-index:100}
    .nav-btn{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;padding:4px 0;background:none;border:none;color:#444;cursor:pointer;font-size:10px}
    .nav-btn.active{color:#fff}
    .nav-icon{font-size:20px;line-height:1}
    .nav-label{font-size:9px;font-weight:600;letter-spacing:.5px;text-transform:uppercase}
    .nav-dot{width:4px;height:4px;border-radius:50%;background:transparent;margin-top:1px}
    .nav-btn.active .nav-dot{background:#fff}
    .empty{text-align:center;color:#444;padding:32px 16px;font-size:13px}
    .loader{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:60px 20px;gap:16px}
    .spin-ring{width:32px;height:32px;border:3px solid rgba(255,255,255,0.1);border-top-color:#fff;border-radius:50%;animation:spin 0.8s linear infinite}
    .ltext{font-size:12px;color:#444}
    .tbl{width:100%;border-collapse:collapse;font-size:12px}
    .tbl th{color:#444;font-weight:600;padding:4px 6px;text-align:center}
    .tbl td{padding:5px 6px;text-align:center;border-bottom:1px solid rgba(255,255,255,0.04)}
    .tbl .l{text-align:left}
    .pos{display:inline-block;width:20px;height:20px;border-radius:50%;font-size:10px;font-weight:700;line-height:20px;text-align:center}
    .pos.cl{background:rgba(74,158,255,0.2);color:#4a9eff}
    .pos.eu{background:rgba(255,165,0,0.2);color:#ffa500}
    .pos.rel{background:rgba(255,68,68,0.2);color:#ff4444}
    .pts{font-weight:700;color:#fff}
    .major-badge{display:inline-block;font-size:9px;font-weight:800;letter-spacing:1.5px;text-transform:uppercase;padding:2px 8px;border-radius:10px;background:rgba(255,200,0,0.15);color:#ffc800;margin-bottom:4px}
    .stream-btn{display:block;width:100%;background:rgba(255,255,255,0.07);border:1px solid rgba(255,255,255,0.12);color:#fff;padding:14px 20px;border-radius:12px;text-decoration:none;font-size:15px;font-weight:600;margin-bottom:10px;text-align:center}
    .srow{display:flex;align-items:center;padding:5px 0;border-bottom:1px solid rgba(255,255,255,0.04);font-size:12px}
    .spos{min-width:30px;font-size:11px;font-weight:700;color:#666}
    .sname{flex:1;font-weight:600}
    .tpar{min-width:42px;text-align:right;font-weight:700}
    .tpar.u{color:#00c878}
    .tpar.o{color:#ff6644}
    .tpar.e{color:#888}
    .thru{min-width:30px;text-align:right;color:#555;font-size:11px}
    .errbox{text-align:center;padding:24px 16px}
    .errmsg{color:#ff6666;font-size:13px;margin-bottom:12px}
    .btn-retry{background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.12);color:#fff;padding:8px 20px;border-radius:8px;cursor:pointer;font-size:13px}
    .hdr-sub{font-size:10px;color:#4a9eff;padding:4px 14px 4px;font-weight:700;text-transform:uppercase;letter-spacing:1px}
    .live-ticker{font-size:10px;color:#ff6666;font-weight:700;text-align:right;padding:0 0 4px}
    .tennis-sets{display:flex;gap:3px;justify-content:flex-end;flex-wrap:nowrap}
    .tennis-set{font-family:monospace;font-size:11px;font-weight:700;min-width:22px;text-align:center;color:#888}
    .tennis-set.won{color:#ccc}
    .tennis-set.lost{color:#444}
    .tennis-score-block{flex:0 0 auto;text-align:right}
  </style>
</head>

<div id="app">
  <div class="header">
    <div class="header-label">Sport Tracker</div>
    <div class="header-row">
      <div class="header-title" id="hdr-title">⚽ Fußball</div>
      <button class="btn-refresh" id="btn-refresh">↻</button>
    </div>
    <div class="header-updated" id="hdr-upd"></div>
  </div>
  <div id="tabs-bar"></div>
  <div id="content"></div>
  <nav class="bottom-nav" id="bottom-nav"></nav>
</div>
<script>
'use strict';
function esc(s){return s==null?'':String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}
function fd(d){if(!d)return '';try{return new Date(d+'T12:00:00').toLocaleDateString('de-DE',{day:'2-digit',month:'2-digit'})}catch(e){return d}}
function ft(d){if(!d)return '';try{const dt=new Date(d);return isNaN(dt)?'':dt.toLocaleTimeString('de-DE',{hour:'2-digit',minute:'2-digit'})}catch(e){return ''}}
function parFmt(n){if(n==null)return 'E';let s=String(n).trim();if(!s)return 'E';s=s.replace(/[−–—]/g,'-');if(s==='E'||s==='Even')return 'E';if(s==='0'||s==='+0'||s==='-0')return 'E';const num=Number(s.replace(/^\+/,''));if(isNaN(num))return s;return num<0?String(num):num===0?'E':'+'+num;}
function parCls(s){let str=String(s||'').trim().replace(/[−–—]/g,'-');if(str==='E')return 'e';const x=Number(str.replace(/^\+/,''));if(isNaN(x))return 'e';return x<0?'u':x>0?'o':'e';}
function el(id){return document.getElementById(id)}

async function safeFetch(url,timeout=5000){
  const ctrl=new AbortController();
  const tid=setTimeout(()=>ctrl.abort(),timeout);
  try{
    const r=await fetch(url,{cache:'no-store',signal:ctrl.signal});
    clearTimeout(tid);
    if(!r.ok)throw new Error('HTTP '+r.status);
    const t=await r.text();
    if(!t||!t.trim())throw new Error('Leere Antwort');
    const s=String(t);const i1=s.indexOf('{');const i2=s.indexOf('[');let i=(i1>=0&&i2>=0)?Math.min(i1,i2):(i1>=0?i1:i2);
    return JSON.parse(i>0?s.slice(i):s);
  }catch(e){clearTimeout(tid);throw e;}
}
async function fetchJSON(url){return safeFetch(url);}

function parseGames(gs){
  const now=Date.now();
  return(gs||[]).map(g=>{
    const resFinal=(g.matchResults||[]).find(r=>r.resultTypeID===2);
    const resHZ=(g.matchResults||[]).find(r=>r.resultTypeID===1);
    const kickoff=g.matchDateTime?new Date(g.matchDateTime).getTime():0;
    const minsElapsed=kickoff?(now-kickoff)/60000:-1;
    const timeLive=!g.matchIsFinished&&kickoff>0&&minsElapsed>=0&&minsElapsed<115;
    const isLive=!g.matchIsFinished&&timeLive;
    const res=resFinal||(isLive?resHZ:null);
    return{home:g.team1?.teamName,away:g.team2?.teamName,
      hs:g.matchIsFinished?(resFinal?resFinal.pointsTeam1:null):isLive?(res?res.pointsTeam1:0):null,
      as:g.matchIsFinished?(resFinal?resFinal.pointsTeam2:null):isLive?(res?res.pointsTeam2:0):null,
      status:g.matchIsFinished?'finished':isLive?'live':'upcoming',
      date:g.matchDateTime?g.matchDateTime.slice(0,10):null,
      time:g.matchDateTime?ft(g.matchDateTime):null};
  });
}

async function getBL(){
  const now=new Date(),nowMs=now.getTime();
  const season=(now.getMonth()>=6)?now.getFullYear():now.getFullYear()-1;
  let md=0;
  try{
    const candidates=await Promise.all(
      Array.from({length:17},(_,i)=>i+18).map(n=>
        safeFetch('https://api.openligadb.de/getmatchdata/bl1/'+season+'/'+n)
          .then(gs=>{
            const times=gs.map(g=>g.matchDateTime?new Date(g.matchDateTime).getTime():null).filter(Boolean);
            if(!times.length)return{n,dist:Infinity};
            const sorted=times.slice().sort((a,b)=>a-b);
            return{n,dist:Math.abs(sorted[Math.floor(sorted.length/2)]-nowMs)};
          }).catch(()=>({n,dist:Infinity}))
      )
    );
    const best=candidates.reduce((a,b)=>a.dist<=b.dist?a:b);
    if(best.dist<Infinity)md=best.n;
  }catch(e){}
  if(!md){try{const cur=await safeFetch('https://api.openligadb.de/getmatchdata/bl1');md=Number(cur[0]?.group?.groupOrderID||0);}catch(e){}}
  return{md:md||25,season};
}

async function fetchBLSpieltag(){
  const{md,season}=await getBL();
  const cur=await safeFetch('https://api.openligadb.de/getmatchdata/bl1/'+season+'/'+md);
  let games=parseGames(cur);
  const todayStr=new Date().toISOString().slice(0,10);
  if(games.some(g=>g.date===todayStr)){
    try{
      const espn=await fetchJSON('https://site.web.api.espn.com/apis/site/v2/sports/soccer/ger.1/scoreboard');
      const evMap={};
      (espn.events||[]).forEach(ev=>{
        const comp=(ev.competitions||[])[0];if(!comp)return;
        const c=comp.competitors||[];if(c.length<2)return;
        const home=c.find(x=>x.homeAway==='home')||c[0],away=c.find(x=>x.homeAway==='away')||c[1];
        const hs=parseInt(home.score||'',10),as_=parseInt(away.score||'',10);
        evMap[(home.team?.displayName||'')+'|'+(away.team?.displayName||'')]={hs:isNaN(hs)?null:hs,as:isNaN(as_)?null:as_,status:comp.status?.type?.completed?'finished':comp.status?.type?.state==='in'?'live':'upcoming',clock:comp.status?.displayClock||''};
      });
      games=games.map(g=>{
        let bestKey=null,bestScore=0;
        Object.keys(evMap).forEach(k=>{const[h,a]=k.split('|');let s=0;if(h&&g.home&&(h.includes(g.home.split(' ').pop())||g.home.includes(h.split(' ').pop())))s+=2;if(a&&g.away&&(a.includes(g.away.split(' ').pop())||g.away.includes(a.split(' ').pop())))s+=2;if(s>bestScore){bestScore=s;bestKey=k;}});
        if(bestKey&&bestScore>=3){const e=evMap[bestKey];if(e.status==='live'||e.status==='finished')return Object.assign({},g,{hs:e.hs!==null?e.hs:g.hs,as:e.as!==null?e.as:g.as,status:e.status,clock:e.clock});}
        return g;
      });
    }catch(e){}
  }
  return{md,games,hasLiveGames:games.some(g=>g.status==='live'||(g.date===todayStr&&g.status!=='finished'))};
}

function parseSoccer(events){
  return(events||[]).map(ev=>{
    const c=ev.competitions?.[0];
    const t1=(c?.competitors||[]).find(x=>x.homeAway==='home');
    const t2=(c?.competitors||[]).find(x=>x.homeAway==='away');
    const done=c?.status?.type?.completed;
    const live=c?.status?.type?.state==='in';
    return{home:t1?.team?.displayName||'?',away:t2?.team?.displayName||'?',
      hs:(done||live)?Number(t1?.score||0):null,as:(done||live)?Number(t2?.score||0):null,
      status:done?'finished':live?'live':'upcoming',
      date:c?.date?.slice(0,10)||null,time:c?.date?ft(c.date):null};
  });
}

async function fetchSoccerMultiDate(league,dates){
  const base='https://site.web.api.espn.com/apis/site/v2/sports/soccer/'+league+'/scoreboard';
  const allGames=[],seen=new Set();
  const results=await Promise.all(dates.map(d=>safeFetch(base+'?limit=100&dates='+d).then(j=>parseSoccer(j.events||[])).catch(()=>[])));
  results.forEach(gs=>gs.forEach(g=>{const k=g.home+'|'+g.away+'|'+g.date;if(!seen.has(k)){seen.add(k);allGames.push(g);}}));
  const live=allGames.filter(g=>g.status==='live');
  const finished=allGames.filter(g=>g.status==='finished').sort((a,b)=>(b.date||'').localeCompare(a.date||''));
  const upcoming=allGames.filter(g=>g.status==='upcoming').sort((a,b)=>(a.date||'').localeCompare(b.date||''));
  return[...live,...finished,...upcoming];
}

async function fetchF1Kalender(){
  const j=await safeFetch('https://api.jolpi.ca/ergast/f1/current/races/?format=json');

  const races=((j.MRData?.RaceTable?.Races)||[]).map(rc=>({
    round:rc.round,name:rc.raceName,circuit:rc.Circuit?.circuitName,date:rc.date,
    past:new Date(rc.date+'T23:59:59Z')<now,raceTime:rc.time||null,
    fp1:rc.FirstPractice,fp2:rc.SecondPractice,fp3:rc.ThirdPractice,
    quali:rc.Qualifying,sprint:rc.Sprint,sprintQuali:rc.SprintQualifying
  }));
  const curIdx=races.findIndex(rc=>{const fp1date=(rc.fp1?.date)||rc.date;return todayStr>=fp1date&&todayStr<=rc.date;});
  const nextIdx=races.findIndex((rc,i)=>!rc.past&&i!==curIdx);
  return{races,curIdx,nextIdx,showPlanIdx:curIdx>=0?curIdx:nextIdx};
}

function golfCountry3(c){const ab=c?.athlete?.birthPlace?.countryAbbreviation;if(ab)return String(ab).toUpperCase();const alt=c?.athlete?.flag?.alt||'';const map={'United States':'USA','England':'ENG','Scotland':'SCO','Wales':'WAL','Northern Ireland':'NIR','Ireland':'IRL','Germany':'GER','France':'FRA','Spain':'ESP','Italy':'ITA','Sweden':'SWE','Norway':'NOR','Denmark':'DEN','Finland':'FIN','Austria':'AUT','Switzerland':'SUI','Netherlands':'NED','Belgium':'BEL','Canada':'CAN','Mexico':'MEX','Brazil':'BRA','Argentina':'ARG','Colombia':'COL','Chile':'CHI','Japan':'JPN','South Korea':'KOR','China':'CHN','Australia':'AUS','New Zealand':'NZL','South Africa':'RSA'};return map[alt]||(alt?alt.slice(0,3).toUpperCase():'');}
function golfTodayDetail(c){const st=c?.status||{};function norm(v){if(v==null)return null;const s=String(v).trim().replace(/[−–—]/g,'-').toUpperCase();if(!s||s==='-'||s==='--')return null;if(s==='EVEN'||s==='0'||s==='+0'||s==='-0')return 'E';if(s==='E')return 'E';if(/^[+\-]\d+$/.test(s))return s;if(/^\d+$/.test(s)){const n=parseInt(s,10);return(n>=1&&n<=18)?null:s;}return null;}let v=norm(st.today?.displayValue??st.today?.value);if(v)return v;v=norm(c?.today?.displayValue??c?.today?.value);if(v)return v;const td=st.todayDetail||st.today?.detail||st.detail||'';const m=String(td).replace(/[−–—]/g,'-').match(/^([+\-]\d+|E|EVEN)/i);if(m)return m[1].toUpperCase()==='EVEN'?'E':m[1].toUpperCase();const ls=c?.linescores||[];if(ls.length){v=norm(ls[ls.length-1]?.displayValue??ls[ls.length-1]?.value);if(v)return v;}return '-';}
async function fetchGolfLB(){
  const{event,comp}=await fetchGolfLive();
  const scores=(comp.competitors||[]).filter(c=>c?.athlete?.displayName).map(c=>{
    const st=c?.status||{};
    // today = heutiger Rundenscore (aus golfTodayDetail)
    const today=golfTodayDetail(c);
    // Total = Summe aller Runden-Linescores (jeder Linescore = Par-Ergebnis einer Runde)
    function calcTotal(c){
      const ls=c?.linescores||[];
      if(!ls.length){
        // Fallback: statistics nach "toPar" oder "totalToPar" suchen
        const stats=c?.statistics||[];
        const tp=stats.find(s=>['toPar','totalToPar','TOT','TO PAR'].includes(s.name||s.abbreviation||''));
        if(tp?.displayValue){const v=String(tp.displayValue).trim().replace(/[−–—]/g,'-');return v==='E'?0:Number(v.replace(/^\+/,''))||0;}
        return null;
      }
      let sum=0;
      for(const l of ls){
        const v=l?.displayValue??l?.value;
        if(v==null)continue;
        const s=String(v).trim().replace(/[−–—]/g,'-');
        if(s==='E'||s==='0')continue; // par
        const n=Number(s.replace(/^\+/,''));
        if(!isNaN(n))sum+=n;
      }
      return sum;
    }
    const totalNum=calcTotal(c);
    const totalStr=totalNum==null?'-':totalNum===0?'E':totalNum>0?'+'+totalNum:String(totalNum);
    return{pos:st?.position?.displayName||'-',player:c.athlete.displayName,country:golfCountry3(c),
      score:totalStr,today,
      thru:st?.displayThru||(st?.type?.state==='post'?'F':(st?.thru!=null?String(st.thru):'-')),
      _totalNum:totalNum??999};
  });
  scores.sort((a,b)=>{const na=parseInt((String(a.pos).match(/\d+/)||['9999'])[0],10);const nb=parseInt((String(b.pos).match(/\d+/)||['9999'])[0],10);return na-nb;});
  return{tournament:event.name||'PGA TOUR',course:'',round:comp?.status?.type?.detail||'',scores};
}

    (lv?'<span class="badge red">● LIVE'+(g.clock?' '+esc(g.clock):'')+'</span>':'')+
    '<div style="display:flex;align-items:center;gap:10px"><div style="flex:1"><div class="team">'+esc(g.home)+'</div><div class="vs">vs</div><div class="team">'+esc(g.away)+'</div></div>'+

    '</div></div></div>';
}
function renderGames(games){if(!games?.length)return '<div class="empty">Keine Spiele</div>';const sorted=games.slice().sort((a,b)=>{const liveA=a.status==='live'?0:1,liveB=b.status==='live'?0:1;if(liveA!==liveB)return liveA-liveB;const da=(a.date||'')+'T'+(a.time||'99:99');const db=(b.date||'')+'T'+(b.time||'99:99');return da<db?-1:da>db?1:0;});return sorted.map(renderGame).join('');}

  const isCL=subTab<=1,showUpcoming=subTab===1||subTab===3;

  if(live.length){h+='<div class="hdr-sub">Live</div>';h+=renderGames(live);}
  if(finished.length){h+='<div class="hdr-sub">Ergebnisse</div>';h+=renderGames(finished);}
  if(upcoming.length){h+='<div class="hdr-sub">Anstehend</div>';h+=renderGames(upcoming);}
  return h;
}

function fmtSession(dateStr,timeStr){if(!dateStr||!timeStr)return '';try{const dt=new Date(dateStr+'T'+timeStr);if(isNaN(dt))return '';return new Intl.DateTimeFormat('de-DE',{weekday:'short',day:'2-digit',month:'2-digit',hour:'2-digit',minute:'2-digit',timeZone:'Europe/Berlin'}).format(dt)+' Uhr';}catch(e){return '';}}

function rF1Kalender(d){
  const races=d.races||[];if(!races.length)return '<div class="empty">Kein Kalender</div>';
  const{showPlanIdx,nextIdx,curIdx}=d;
  return races.map((r,i)=>{
    const isCur=i===curIdx,isNext=i===nextIdx,showPlan=i===showPlanIdx,highlight=isCur||isNext;
    let schedule='';
    if(showPlan){
      const sessions=[];
      if(r.fp1?.date&&r.fp1?.time)sessions.push({label:'Training 1',dt:fmtSession(r.fp1.date,r.fp1.time)});
      if(r.fp2?.date&&r.fp2?.time)sessions.push({label:'Training 2',dt:fmtSession(r.fp2.date,r.fp2.time)});
      if(r.sprintQuali?.date&&r.sprintQuali?.time)sessions.push({label:'Sprint-Qualifying',dt:fmtSession(r.sprintQuali.date,r.sprintQuali.time)});
      if(r.sprint?.date&&r.sprint?.time)sessions.push({label:'Sprint',dt:fmtSession(r.sprint.date,r.sprint.time)});
      if(r.fp3?.date&&r.fp3?.time)sessions.push({label:'Training 3',dt:fmtSession(r.fp3.date,r.fp3.time)});
      if(r.quali?.date&&r.quali?.time)sessions.push({label:'Qualifying',dt:fmtSession(r.quali.date,r.quali.time)});
      if(r.date&&r.raceTime)sessions.push({label:'Rennen',dt:fmtSession(r.date,r.raceTime),isRace:true});
      if(sessions.length){
        schedule='<div style="margin-top:10px;border-top:1px solid rgba(255,255,255,0.08);padding-top:8px">';
        sessions.forEach(s=>{if(!s.dt)return;schedule+='<div style="display:flex;justify-content:space-between;padding:4px 0;border-bottom:1px solid rgba(255,255,255,0.04)"><span style="font-size:12px;font-weight:'+(s.isRace?'800':'600')+';color:'+(s.isRace?'#ff4444':'#ccc')+'">'+esc(s.label)+'</span><span style="font-size:11px;color:#888">'+esc(s.dt)+'</span></div>';});
        schedule+='</div>';
      }
    }
    return '<div class="card'+(isCur?' live-red':isNext?' live-blue':'')+'">'+
      (isCur?'<span class="badge red">Aktuelles Wochenende</span>':isNext?'<span class="badge blue">Nächstes Rennen</span>':'')+
      '<div style="display:flex;align-items:center;gap:10px"><div style="flex:1"><div style="font-size:13px;font-weight:700;'+(r.past&&!highlight?'opacity:0.4':'')+'">'+( r.round?r.round+'. ':'')+esc(r.name)+'</div><div style="font-size:11px;color:#555;margin-top:2px">'+esc(r.circuit||'')+'</div></div><div style="text-align:right"><div style="font-size:12px;color:'+(r.past&&!highlight?'#444':'#ccc')+';font-weight:600">'+esc(r.date)+'</div></div></div>'+schedule+'</div>';
  }).join('');
}

function rF1Ergebnisse(d){
  const year=d.year||new Date().getFullYear();
  const base='https://www.formula1.com/en/results/'+year+'/races';
  if(!d.sessions?.length){
    const mk=d.meetingKey||'';
    const loc=d.locationSlug||'';
    const base='https://www.formula1.com/en/results/'+year+'/races';
    const pfx=mk&&loc?base+'/'+mk+'/'+loc:'';
    const links=[
      {label:'Training 1',  url:pfx?pfx+'/practice/1':base},
      {label:'Training 2',  url:pfx?pfx+'/practice/2':base},
      {label:'Training 3',  url:pfx?pfx+'/practice/3':base},
      {label:'Qualifying',  url:pfx?pfx+'/qualifying':base},
      {label:'Rennen',      url:pfx?pfx+'/race-result':base},
    ];
    return '<div class="card" style="padding:12px 16px 6px">'+
      '<div style="font-size:13px;font-weight:700;margin-bottom:4px;text-align:center">'+(d.raceName||'Aktuelles Rennen')+'</div>'+
      '<div style="font-size:11px;color:#555;margin-bottom:12px;text-align:center">Ergebnisse ab Montag automatisch · Während des Wochenendes:</div>'+
      links.map(l=>'<a href="'+l.url+'" target="_blank" rel="noopener" '+
        'style="display:flex;align-items:center;justify-content:space-between;'+
        'background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.08);'+
        'border-radius:10px;padding:10px 14px;margin-bottom:6px;text-decoration:none;color:#fff">'+
        '<span style="font-size:13px;font-weight:600">'+l.label+'</span>'+
        '<span style="font-size:11px;color:#4a9eff">formula1.com →</span></a>').join('')+
      '</div>';
  }
  let h='<div class="card" style="text-align:center;padding:9px 14px"><div style="font-size:13px;font-weight:700">'+esc(d.raceName||'')+'</div><div style="font-size:11px;color:#555">'+esc(d.raceDate||'')+'</div></div>';
  d.sessions.forEach(s=>{const hasTeam=(s.results||[]).some(r=>r.team);const hasTime=(s.results||[]).some(r=>r.time);h+='<div class="card" style="padding:0 6px"><div style="padding:8px 6px 4px;font-size:10px;font-weight:800;letter-spacing:1.5px;text-transform:uppercase;color:'+(s.isRace?'#ff4444':'#4a9eff')+'">'+esc(s.label)+'</div>'+(s.pending?'<div style="font-size:12px;color:#555;padding:6px 6px 10px">⏳ Offizielle Ergebnisse folgen in Kürze</div>':s.note?'<div style="font-size:10px;color:#555;padding:0 6px 6px">'+esc(s.note)+'</div>':'')+(s.pending?'':"<table class=\"tbl\"><thead><tr><th>#</th><th class=\"l\">Fahrer</th>"+(hasTeam?'<th class=\"l\">Team</th>':'')+(hasTime?'<th>Zeit</th>':'')+'</tr></thead><tbody>'+(s.results||[]).map(r=>'<tr><td><span class="pos '+(r.pos<=3?'cl':r.pos<=10?'eu':'')+'">'+r.pos+'</span></td><td class="l"><b>'+esc(r.driver)+'</b></td>'+(hasTeam?'<td class="l" style="font-size:11px;color:#555">'+esc(r.team)+'</td>':'')+(hasTime?'<td style="font-size:11px;color:#666">'+esc(r.time)+'</td>':'')+'</tr>').join('')+'</tbody></table>')+'</div>';});
  return h;
}
function rF1Fahrer(d){return '<div class="card" style="padding:0 6px"><table class="tbl"><thead><tr><th>#</th><th class="l">Fahrer</th><th class="l">Team</th><th>Pkt</th></tr></thead><tbody>'+(d.standings||[]).map(s=>'<tr><td><span class="pos '+(s.pos<=3?'cl':s.pos<=10?'eu':'')+'">'+s.pos+'</span></td><td class="l"><b>'+esc(s.driver)+'</b></td><td class="l" style="font-size:11px;color:#555">'+esc(s.team)+'</td><td><span class="pts">'+s.points+'</span></td></tr>').join('')+'</tbody></table></div>';}
function rF1Teams(d){return '<div class="card" style="padding:0 6px"><table class="tbl"><thead><tr><th>#</th><th class="l">Team</th><th>Pkt</th></tr></thead><tbody>'+(d.standings||[]).map(s=>'<tr><td><span class="pos '+(s.pos<=3?'cl':s.pos<=5?'eu':'')+'">'+s.pos+'</span></td><td class="l"><b>'+esc(s.team)+'</b></td><td><span class="pts">'+s.points+'</span></td></tr>').join('')+'</tbody></table></div>';}

function inferWinner(s1){const sets=[];String(s1||'').split(/\s+/).forEach(t=>{const m=t.match(/(\d+)[-:](\d+)/);if(m)sets.push([+m[1],+m[2]]);});let wa=0,wb=0;for(const s of sets){if(s[0]>s[1])wa++;else if(s[0]<s[1])wb++;}return wa>wb?1:wb>wa?2:0;}
function parseTennisSets(s1){const sets=[];String(s1||'').replace(/,/g,' ').split(/\s+/).forEach(t=>{const m=t.match(/^(\d+)[-:](\d+)(\(\d+\))?$/);if(m)sets.push({g1:+m[1],g2:+m[2],tb:m[3]?m[3].replace(/[()]/g,''):null});});return sets;}
function matchCard(m){
  const done=m.status==='finished',live=m.status==='live';
  const win=m.winner||(done?inferWinner(m.score1):0);const w1=win===1,w2=win===2;
  let scoreHtml='';
  if(done){const s1=String(m.score1||'').trim();if(/^w\/?o$/i.test(s1)||/walkover/i.test(s1)||/ret(ired)?/i.test(s1)){scoreHtml='<div class="tennis-score-block"><div style="font-size:11px;color:#888">'+esc(s1)+'</div></div>';}
  else{const sets=parseTennisSets(m.score1);let r1='<div class="tennis-sets">',r2='<div class="tennis-sets">';sets.forEach(s=>{const p1w=s.g1>s.g2,p2w=s.g2>s.g1;const tb=s.tb?'<sup style="font-size:8px;color:#555">'+s.tb+'</sup>':'';r1+='<span class="tennis-set '+(p1w?'won':'lost')+'">'+s.g1+(p1w&&s.tb?tb:'')+'</span>';r2+='<span class="tennis-set '+(p2w?'won':'lost')+'">'+s.g2+(!p1w&&s.tb?tb:'')+'</span>';});scoreHtml='<div class="tennis-score-block">'+r1+'</div>'+r2+'</div></div>';}}
  else{scoreHtml='<div class="tennis-score-block"><div style="font-size:12px;color:#4a9eff">'+esc(m.time||'')+'</div></div>';}
  return '<div class="card'+(live?' live-red':'')+'">'+
    (live?'<span class="badge red">● LIVE</span>':'')+
    '<div style="font-size:9px;color:#555;text-transform:uppercase;letter-spacing:1px;margin-bottom:6px;font-weight:700">'+esc(m.tourn||'')+(m.round?' · '+esc(m.round):'')+'</div>'+
    '<div style="display:flex;align-items:center;gap:8px"><div style="flex:1"><div style="font-size:13px;font-weight:'+(w1?'900':'500')+';color:'+(w1?'#fff':done&&!w1?'#555':'#ccc')+'">'+esc(m.player1)+'</div><div style="font-size:13px;font-weight:'+(w2?'900':'500')+';color:'+(w2?'#fff':done&&!w2?'#555':'#ccc')+';margin-top:4px">'+esc(m.player2)+'</div></div>'+scoreHtml+'</div></div>';
}
function rTennis(d,subTab){
  let h='<div class="card" style="text-align:center;padding:8px 14px"><div style="font-size:12px;font-weight:700;color:#888">'+esc(d.tournament||'')+'</div></div>';
  if(subTab===0){const fin=(d.results||[]).filter(m=>m.status==='finished');if(!fin.length)return h+'<div class="empty">Keine Ergebnisse</div>';h+='<div class="hdr-sub">Ergebnisse</div>';fin.forEach(m=>{h+=matchCard(m);});return h;}
  if(subTab===1){const up=(d.matches||[]).filter(m=>m.status==='upcoming'&&String(m.player1||'').trim().toUpperCase()!=='TBD'&&String(m.player2||'').trim().toUpperCase()!=='TBD');if(!up.length)return h+'<div class="empty">Keine geplanten Matches</div>';h+='<div class="hdr-sub">Anstehend</div>';up.forEach(m=>{h+=matchCard(m);});return h;}
  if(subTab===2){h+='<div class="hdr-sub">'+(d._tour==='WTA'?'WTA':'ATP')+' Weltrangliste</div><div class="card" style="padding:0 6px"><table class="tbl"><thead><tr><th>#</th><th class="l">Spieler</th><th class="l">Land</th><th>Punkte</th></tr></thead><tbody>';(d.rankings||[]).forEach(r=>{h+='<tr><td><span class="pos '+(r.pos<=4?'cl':r.pos<=8?'eu':'')+'">'+r.pos+'</span></td><td class="l"><b>'+esc(r.player)+'</b></td><td class="l" style="font-size:11px;color:#555">'+esc(r.country)+'</td><td><span class="pts">'+esc(r.points)+'</span></td></tr>';});return h+'</tbody></table></div>';}
  if(subTab===3){const kal=d.kalender||[];if(kal.length){kal.forEach(t=>{const isGS=t.cat==='Grand Slam',date=t.date&&t.end?fd(t.date)+' – '+fd(t.end):'';h+='<div class="card">'+(isGS?'<span class="major-badge">GRAND SLAM</span>':'<span style="font-size:9px;color:#4a9eff;font-weight:700;text-transform:uppercase;letter-spacing:1px">'+esc(t.cat)+'</span>')+'<div style="font-size:13px;font-weight:700;margin-top:4px">'+esc(t.name)+(t.live?' <span style="color:#00c878">● LIVE</span>':'')+'</div><div style="font-size:11px;color:#555;margin-top:2px">'+esc(t.city)+'</div><div style="font-size:11px;color:#4a9eff;margin-top:2px;font-weight:600">'+date+'</div></div>';});}return h;}
  return h+'<div class="empty">Keine Daten</div>';
}

function rGolfLB(d){
  let h='<div class="card"><div style="font-size:13px;font-weight:700">'+esc(d.tournament)+'</div><div style="font-size:11px;color:#555;margin-top:2px">'+esc(d.course||'')+' · '+esc(d.round||'')+'</div></div>';
  if(!(d.scores||[]).length)return h+'<div class="empty">Keine Scores</div>';
  h+='<div class="card" style="padding:8px 10px"><div style="display:flex;padding:0 0 5px;border-bottom:1px solid rgba(255,255,255,0.06);font-size:10px;color:#444"><span style="min-width:36px">#</span><span style="flex:1">Spieler</span><span style="min-width:40px;text-align:right">Heute</span><span style="min-width:42px;text-align:right">Total</span><span style="min-width:30px;text-align:right">Thru</span></div>';
  // ESPN liefert score bereits als aktuellen Gesamtstand inkl. laufender Runde
  // Nur nach score sortieren, nicht nochmal today addieren
  function toNum(s){const x=String(s||'').trim().replace(/[−–—]/g,'-');if(x==='E'||x==='Even'||x==='0')return 0;const n=Number(x.replace(/^\+/,''));return isNaN(n)?0:n;}
  const scored=d.scores.slice().sort((a,b)=>(a._totalNum??toNum(a.score))-(b._totalNum??toNum(b.score)));
  scored.forEach((s,i)=>{
    const sc=parFmt(s.score),td=parFmt(s.today);
    h+='<div class="srow"><span class="spos">'+esc(s.pos)+'</span><span class="sname">'+esc(s.player)+'<span style="font-size:10px;color:#444;margin-left:4px">'+esc(s.country)+'</span></span><span style="font-size:12px;color:#666;min-width:40px;text-align:right">'+esc(td)+'</span><span class="tpar '+parCls(sc)+'">'+esc(sc)+'</span><span class="thru">'+esc(s.thru)+'</span></div>';
  });
  return h+'</div>';
}
function rGolfPlan(d){
  const events=d.events||[];if(!events.length)return '<div class="empty">Keine Turniere</div>';
  const today=new Date().toISOString().slice(0,10);const nextIdx=events.findIndex(e=>e.end>=today&&!e.live);
  return events.map((e,i)=>{const date=e.date&&e.end?fd(e.date)+' – '+fd(e.end):'';const isPast=e.end<today&&!e.live;const isNext=i===nextIdx;
    return '<div class="card'+(e.live?' live-red':isNext?' live-blue':'')+'">'+
      (e.live?'<span class="badge red">● LIVE</span>':isNext?'<span class="badge blue">Nächstes Turnier</span>':'')+
      (e.major?'<span class="major-badge">MAJOR</span>':'')+
      '<div style="font-size:13px;font-weight:700;margin-top:'+(e.major||e.live||isNext?4:0)+'px;'+(isPast?'opacity:0.4':'')+'">'+esc(e.name)+'</div>'+
      '<div style="font-size:11px;color:#555;margin-top:2px">'+esc(e.course)+'</div>'+
      '<div style="font-size:11px;color:#4a9eff;margin-top:2px;font-weight:600">'+date+'</div></div>';
  }).join('');
}
function rGolfTeeTimes(d){
  let h='<div class="card" style="text-align:center;padding:9px 14px"><div style="font-size:13px;font-weight:700">'+esc(d.tournament||'PGA Tour')+'</div><div style="font-size:11px;color:#555;margin-top:2px">'+esc(d.round||'')+'</div>'+(d.note?'<div style="font-size:10px;color:#444;margin-top:2px">'+esc(d.note)+'</div>':'')+'</div>';
  if(!d.teetimes?.length)return h+'<div class="empty">Keine Tee-Times</div>';
  h+='<div class="card" style="padding:0 6px"><table class="tbl"><thead><tr><th class="l" style="min-width:80px">ET / DE</th><th class="l">Spieler</th></tr></thead><tbody>';
  d.teetimes.forEach(t=>{
    const deStr=t.teeDE?'<span style="color:#4a9eff"> / '+esc(t.teeDE)+'</span>':'';
    h+='<tr><td style="font-size:11px;vertical-align:top;white-space:nowrap"><span style="font-weight:700;color:#fff">'+esc(t.teeTime)+'</span>'+deStr+'</td><td class="l">'+(t.players||[]).map(p=>'<div>'+esc(p)+'</div>').join('')+'</td></tr>';});
  return h+'</tbody></table></div>';
}
function rStreams(content){content.innerHTML='<div class="card" style="padding:16px"><div style="font-size:13px;font-weight:700;margin-bottom:14px;text-align:center">🔴 Live Streams</div><a href="https://www.vipbox.lc" target="_blank" class="stream-btn">vipbox.lc</a><a href="https://buffsports.io" target="_blank" class="stream-btn">buffsports.io</a><a href="https://livetv.ru" target="_blank" class="stream-btn" style="margin-bottom:0">livetv.ru</a></div>';}

function switchSport(id){state.cur=id;buildNav();render();const tab=state.tabs[id];if(id!=='streams'&&!cache[id+'_'+tab]&&!busy[id+'_'+tab])load(id,tab);}
function switchTab(i){state.tabs[state.cur]=i;render();const k=state.cur+'_'+i;if(!cache[k]&&!busy[k])load(state.cur,i);}
function refresh(){const k=state.cur+'_'+state.tabs[state.cur];delete cache[k];load(state.cur,state.tabs[state.cur]);}

let _startY=0;
document.addEventListener('touchstart',e=>{_startY=e.touches[0].clientY;},{passive:true});
document.addEventListener('touchmove',e=>{const el2=e.target.closest('.tabs');if(el2)return;const dy=e.touches[0].clientY-_startY;if(dy>0&&(window.scrollY||document.documentElement.scrollTop)===0){e.preventDefault();}},{passive:false});

try{const saved=JSON.parse(sessionStorage.getItem('trackerState')||'{}');if(saved.cur&&SPORTS.find(s=>s.id===saved.cur))state.cur=saved.cur;if(saved.tabs)Object.assign(state.tabs,saved.tabs);if(saved.tennisSub!=null)tennisSub.tab=saved.tennisSub;if(saved.euroSub!=null)euroSub.tab=saved.euroSub;}catch(e){}
function saveState(){try{sessionStorage.setItem('trackerState',JSON.stringify({cur:state.cur,tabs:state.tabs,tennisSub:tennisSub.tab,euroSub:euroSub.tab}));}catch(e){}}
const _switchSport=switchSport;switchSport=function(id){_switchSport(id);saveState();};
const _switchTab=switchTab;switchTab=function(i){_switchTab(i);saveState();};

el('btn-refresh').addEventListener('click',refresh);
buildNav();render();
Object.keys(LOADERS).forEach(k=>{const[s,t]=k.split('_');load(s,Number(t));});
</script>
